<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transaksi - AI Finance Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen">
    <nav class="bg-slate-950 border-b border-purple-500/20">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-gradient-to-br from-purple-400 to-pink-400 rounded-lg flex items-center justify-center">
                    <i class="fas fa-wallet text-white text-lg"></i>
                </div>
                <span class="text-xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent">
                    FinanceAI
                </span>
            </div>
            <div class="flex items-center space-x-4">
                <a href="/dashboard" class="text-gray-300 hover:text-purple-400 transition">Dashboard</a>
                <a href="/advisor" class="text-gray-300 hover:text-purple-400 transition">AI Advisor</a>
                <a href="/settings" class="text-gray-300 hover:text-purple-400 transition">Pengaturan</a>
                <button onclick="logout()" class="px-4 py-2 bg-red-500/20 hover:bg-red-500/30 text-red-300 rounded-lg">Logout</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-4xl font-bold text-white mb-2">Kelola Transaksi</h1>
            <p class="text-gray-400">Catat dan pantau semua transaksi keuangan Anda</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Add Transaction Form -->
            <div class="lg:col-span-1">
                <div class="bg-slate-800/50 backdrop-blur border border-purple-500/20 rounded-2xl p-6">
                    <h3 class="text-xl font-bold text-white mb-6">Tambah Transaksi Baru</h3>

                    <form id="transactionForm">
                        <!-- Date -->
                        <div class="mb-4">
                            <label class="block text-gray-300 font-medium mb-2">Tanggal</label>
                            <input type="date" id="date" required
                                   class="w-full px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 transition text-base">
                        </div>

                        <!-- Type -->
                        <div class="mb-4">
                            <label class="block text-gray-300 font-medium mb-2">Jenis</label>
                            <select id="type" required
                                    class="w-full px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 transition text-base">
                                <option value="income">Pemasukan</option>
                                <option value="expense">Pengeluaran</option>
                            </select>
                        </div>

                        <!-- Category -->
                        <div class="mb-4">
                            <label class="block text-gray-300 font-medium mb-2">Kategori</label>
                            <select id="category" required
                                    class="w-full px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white focus:outline-none focus:border-purple-400 transition text-base">
                                <option>Pilih kategori...</option>
                            </select>
                        </div>

                        <!-- Amount -->
                        <div class="mb-4">
                            <label class="block text-gray-300 font-medium mb-2">Jumlah (Rp)</label>
                            <input type="number" id="amount" placeholder="0" required
                                   class="w-full px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-400 transition text-base">
                        </div>

                        <!-- Description -->
                        <div class="mb-6">
                            <label class="block text-gray-300 font-medium mb-2">Deskripsi</label>
                            <textarea id="description" placeholder="Optional..."
                                      class="w-full px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-400 transition text-base"
                                      rows="3"></textarea>
                        </div>

                        <button type="submit" class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold rounded-lg transition text-base">
                            <i class="fas fa-plus mr-2"></i>Tambah Transaksi
                        </button>
                    </form>
                </div>
            </div>

            <!-- Transaction List -->
            <div class="lg:col-span-2">
                <div class="bg-slate-800/50 backdrop-blur border border-purple-500/20 rounded-2xl p-6">
                    <h3 class="text-xl font-bold text-white mb-6">Daftar Transaksi Terbaru</h3>

                    <!-- Filter -->
                    <div class="flex gap-4 mb-6">
                        <select id="filterType" class="flex-1 px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white text-base">
                            <option value="">Semua Jenis</option>
                            <option value="income">Pemasukan</option>
                            <option value="expense">Pengeluaran</option>
                        </select>
                        <select id="filterMonth" class="flex-1 px-4 py-2 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white text-base">
                            <option value="">Semua Bulan</option>
                        </select>
                    </div>

                    <div id="transactionList" class="space-y-4">
                        <p class="text-gray-500 text-center py-8">Belum ada transaksi</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
        }

        const user = JSON.parse(localStorage.getItem('user'));
        const token = localStorage.getItem('token');

        // Category mapping
        const categories = {
            personal: {
                income: ['Gaji', 'Freelance', 'Investasi', 'Hadiah', 'Lainnya'],
                expense: ['Makanan', 'Transportasi', 'Kesehatan', 'Hiburan', 'Belanja', 'Tagihan', 'Pendidikan', 'Lainnya']
            },
            business: {
                income: ['Penjualan', 'Jasa', 'Investasi', 'Pinjaman', 'Lainnya'],
                expense: ['Gaji Karyawan', 'Operasional', 'Bahan Baku', 'Marketing', 'Sewa', 'Pajak', 'Utilitas', 'Lainnya']
            }
        };

        // Update categories based on account type and transaction type
        document.getElementById('type').addEventListener('change', updateCategories);
        updateCategories();

        function updateCategories() {
            const type = document.getElementById('type').value;
            const catList = categories[user.account_type][type];
            const select = document.getElementById('category');
            select.innerHTML = catList.map(c => `<option>${c}</option>`).join('');
        }

        // Set today's date
        document.getElementById('date').valueAsDate = new Date();

        // Populate month filter
        const now = new Date();
        for (let i = 0; i < 12; i++) {
            const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
            const option = document.createElement('option');
            option.value = d.toISOString().slice(0, 7);
            option.textContent = d.toLocaleDateString('id-ID', { month: 'long', year: 'numeric' });
            document.getElementById('filterMonth').appendChild(option);
        }

        // Load transactions
        async function loadTransactions() {
            try {
                let url = '/api/transactions';
                const params = new URLSearchParams();
                if (document.getElementById('filterType').value) {
                    params.append('type', document.getElementById('filterType').value);
                }
                if (document.getElementById('filterMonth').value) {
                    params.append('month', document.getElementById('filterMonth').value);
                }
                if (params.toString()) {
                    url += '?' + params.toString();
                }

                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const transactions = await res.json();

                const list = document.getElementById('transactionList');
                if (transactions.length === 0) {
                    list.innerHTML = '<p class="text-gray-500 text-center py-8">Belum ada transaksi</p>';
                    return;
                }

                list.innerHTML = transactions.map(tx => `
                    <div class="flex items-center justify-between p-4 bg-slate-700/30 border border-purple-500/20 rounded-lg hover:border-purple-400/50 transition">
                        <div class="flex-1">
                            <p class="text-white font-semibold text-lg">${tx.category}</p>
                            <p class="text-gray-400 text-sm">${new Date(tx.date).toLocaleDateString('id-ID')}</p>
                            ${tx.description ? `<p class="text-gray-500 text-sm">${tx.description}</p>` : ''}
                        </div>
                        <p class="text-2xl font-bold ${tx.type === 'income' ? 'text-green-400' : 'text-red-400'}">
                            ${tx.type === 'income' ? '+' : '-'}Rp ${Math.round(tx.amount).toLocaleString('id-ID')}
                        </p>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error loading transactions:', error);
            }
        }

        // Add transaction
        document.getElementById('transactionForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const transaction = {
                date: document.getElementById('date').value,
                type: document.getElementById('type').value,
                category: document.getElementById('category').value,
                amount: parseFloat(document.getElementById('amount').value),
                description: document.getElementById('description').value
            };

            try {
                const res = await fetch('/api/transactions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(transaction)
                });

                if (res.ok) {
                    document.getElementById('transactionForm').reset();
                    document.getElementById('date').valueAsDate = new Date();
                    updateCategories();
                    loadTransactions();
                } else {
                    alert('Gagal menambah transaksi');
                }
            } catch (error) {
                console.error('Error:', error);
            }
        });

        // Filter listeners
        document.getElementById('filterType').addEventListener('change', loadTransactions);
        document.getElementById('filterMonth').addEventListener('change', loadTransactions);

        function logout() {
            localStorage.clear();
            window.location.href = '/login';
        }

        loadTransactions();
    </script>
</body>
</html>
