<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AI Finance Advisor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-slate-900 via-purple-900 to-slate-900 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-400 to-pink-400 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-wallet text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-bold bg-gradient-to-r from-purple-400 to-pink-400 bg-clip-text text-transparent mb-2">
                FinanceAI
            </h1>
            <p class="text-gray-400">Manajemen Keuangan Cerdas Berbasis AI</p>
        </div>

        <!-- Login Form -->
        <div class="bg-slate-800/50 backdrop-blur-xl border border-purple-500/20 rounded-2xl p-8 shadow-2xl">
            <h2 class="text-2xl font-bold text-white mb-6">Masuk Akun</h2>

            <form id="loginForm">
                <!-- Email Input -->
                <div class="mb-4">
                    <label class="block text-gray-300 font-medium mb-2">Email</label>
                    <input type="email" id="email" name="email" 
                           class="w-full px-4 py-3 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-400 transition"
                           placeholder="nama@example.com" required>
                </div>

                <!-- Password Input -->
                <div class="mb-6">
                    <label class="block text-gray-300 font-medium mb-2">Password</label>
                    <input type="password" id="password" name="password"
                           class="w-full px-4 py-3 bg-slate-700/50 border border-purple-500/30 rounded-lg text-white placeholder-gray-500 focus:outline-none focus:border-purple-400 transition"
                           placeholder="••••••••" required>
                </div>

                <!-- Error Message -->
                <div id="errorMsg" class="hidden mb-4 p-4 bg-red-500/20 border border-red-500/50 rounded-lg text-red-300 text-sm"></div>

                <!-- Login Button -->
                <button type="submit" 
                        class="w-full py-3 bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-semibold rounded-lg transition transform hover:scale-105 mb-4">
                    <i class="fas fa-sign-in-alt mr-2"></i>Masuk
                </button>
            </form>

            <!-- Divider -->
            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-purple-500/20"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-slate-800/50 text-gray-400">Atau</span>
                </div>
            </div>

            <!-- Sign Up Link -->
            <a href="/register" class="w-full block text-center py-3 border border-purple-500/30 hover:border-purple-400 text-purple-300 hover:text-purple-200 font-semibold rounded-lg transition">
                <i class="fas fa-user-plus mr-2"></i>Buat Akun Baru
            </a>
        </div>

        <!-- Demo Info -->
        <div class="mt-6 text-center text-gray-400 text-sm">
            <p>Demo Account:</p>
            <p>Email: demo@example.com | Password: demo123</p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/dashboard';
                } else {
                    document.getElementById('errorMsg').textContent = data.error || 'Login gagal';
                    document.getElementById('errorMsg').classList.remove('hidden');
                }
            } catch (error) {
                document.getElementById('errorMsg').textContent = 'Terjadi kesalahan. Coba lagi.';
                document.getElementById('errorMsg').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
